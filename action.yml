name: Aliensit
description:
  Generate a grounded protection, wellbeing, and payment plan for a person or
  project
author: phuquoc81

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: shield
  color: blue

# Define your inputs here.
inputs:
  subject:
    description:
      Person, team, or project that should receive the grounded plan; defaults
      to phu to match the original request when left blank
    required: false
    default: phu

# Define your outputs here.
outputs:
  affirmation:
    description: A short grounded affirmation for the requested subject
  protection_plan:
    description: Practical door and access security guidance
  wellbeing_plan:
    description: Practical body and mind support guidance
  money_plan:
    description: Practical Stripe and bank transfer guidance

runs:
  using: node24
  main: dist/index.js
